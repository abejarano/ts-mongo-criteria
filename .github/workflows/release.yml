name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write # Para crear tags, commits y releases
  issues: write # Para crear issues en caso de fallos
  pull-requests: write # Para PRs automáticos
  id-token: write # Para autenticación
  packages: write # Para publicar en GitHub Packages
  actions: read # Para leer workflow runs
  checks: read # Para leer checks

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Run type checking
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Run Bun smoke tests
        run: bun run test:bun

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Ensure npm supports trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify npm OIDC is available
        run: |
          test "$GITHUB_ACTIONS" = "true"
          test -n "$ACTIONS_ID_TOKEN_REQUEST_URL"
          test -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN"

      - name: Release and Publish to npm
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: GITHUB_ACTIONS=true npx semantic-release
